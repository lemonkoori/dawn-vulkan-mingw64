name: build-dawn-msys2
on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * 0"
  push:
    branches:
      - main
jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - uses: msys2/setup-msys2@v2
        with:
          update: true
          msystem: UCRT64
          install: >-
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-python
      - name: Clone, Patch and Fetch Dependencies
        shell: pwsh
        run: |
          git clone https://dawn.googlesource.com/dawn
          cd dawn
          git apply --3way --union "${{ github.workspace }}/build.patch"
          python tools/fetch_dawn_dependencies.py
      - name: Cmake
        shell: pwsh
        run: |
          cd dawn
          mkdir out/Release
          cmake -S . -B out/Release -G Ninja -DDAWN_ENABLE_D3D12=OFF -DDAWN_ENABLE_D3D11=OFF -DDAWN_ENABLE_VULKAN=ON -DDAWN_USE_GLFW=OFF -DDAWN_BUILD_SAMPLES=OFF -DDAWN_ENABLE_NULL=OFF -DDAWN_USE_WINDOWS_UI=OFF -DTINT_BUILD_HLSL_WRITER=OFF -DDAWN_ENABLE_INSTALL=ON -DCMAKE_BUILD_TYPE=Release
      - name: Build
        shell: msys2 {0}
        run: |
          cd dawn/out/Release
          ninja
      - name: Install
        shell: pwsh
        run: |
          cd dawn
          cmake --install out/Release --prefix dawn-x86-64-windows-gnu-release
          tar -czf dawn-x86-64-windows-gnu-release.tar.gz dawn-x86-64-windows-gnu-release
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dawn-x86-64-windows-gnu-release
          path: dawn-x86-64-windows-gnu-release.tar.gz
          if-no-files-found: error
          compression-level: 0
